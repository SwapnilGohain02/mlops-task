name: Docker Build & Run Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  docker-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t mlops-task .

      - name: Run Docker container
        run: docker run --rm mlops-task

      - name: Verify metrics.json output
        run: |
          OUTPUT=$(docker run --rm mlops-task python run.py \
            --input data.csv \
            --config config.yaml \
            --output metrics.json \
            --log-file run.log)
          echo "$OUTPUT"
          echo "$OUTPUT" | python3 -c "
          import json, sys
          data = sys.stdin.read()
          lines = [l for l in data.strip().split('\n') if l.strip().startswith('{')]
          m = json.loads(lines[-1])
          print('Status:', m['status'])
          print('Value:', m['value'])
          print('Rows:', m['rows_processed'])
          if m['status'] != 'success':
              print('FAIL')
              sys.exit(1)
          print('PASS: metrics.json correct')
          "

      - name: Determinism check (run twice, compare)
        run: |
          RUN1=$(docker run --rm mlops-task python run.py \
            --input data.csv --config config.yaml \
            --output metrics.json --log-file run.log | grep '"value"' | tr -d ' ",')

          RUN2=$(docker run --rm mlops-task python run.py \
            --input data.csv --config config.yaml \
            --output metrics.json --log-file run.log | grep '"value"' | tr -d ' ",')

          echo "Run 1 value: $RUN1"
          echo "Run 2 value: $RUN2"

          if [ "$RUN1" = "$RUN2" ]; then
            echo "PASS: Outputs are deterministic"
          else
            echo "FAIL: Non-deterministic outputs"
            exit 1
          fi