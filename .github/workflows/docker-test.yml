name: Docker Build & Run Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  docker-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t mlops-task .

      - name: Run Docker container
        run: docker run --rm mlops-task

      - name: Determinism check
        run: |
          RUN1=$(docker run --rm mlops-task python run.py --input data.csv --config config.yaml --output metrics.json --log-file run.log | grep '"value"' | tr -d ' ",')
          RUN2=$(docker run --rm mlops-task python run.py --input data.csv --config config.yaml --output metrics.json --log-file run.log | grep '"value"' | tr -d ' ",')
          echo "Run1: $RUN1"
          echo "Run2: $RUN2"
          if [ "$RUN1" = "$RUN2" ]; then echo "PASS"; else echo "FAIL"; exit 1; fi